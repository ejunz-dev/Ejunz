{% set page_name = "learnPage" %}
{% extends "layout/basic.html" %}
{% block content %}
<script>
  {{ set(UiContext, 'domainId', domainId) }}
  {{ set(UiContext, 'lessonSessionId', lessonSessionId or '') }}
  {{ set(UiContext, 'currentProgress', currentProgress) }}
  {{ set(UiContext, 'totalProgress', totalProgress) }}
  {{ set(UiContext, 'totalCards', totalCards) }}
  {{ set(UiContext, 'totalCheckinDays', totalCheckinDays) }}
  {{ set(UiContext, 'consecutiveDays', consecutiveDays) }}
  {{ set(UiContext, 'dailyGoal', dailyGoal) }}
  {{ set(UiContext, 'learnSessionMode', learnSessionMode or 'deep') }}
  {{ set(UiContext, 'learnNewReviewRatio', learnNewReviewRatio if learnNewReviewRatio is defined else 1) }}
  {{ set(UiContext, 'learnNewReviewOrder', learnNewReviewOrder or 'new_first') }}
  {{ set(UiContext, 'learnSessionCardFilter', learnSessionCardFilter or 'all') }}
  {{ set(UiContext, 'learnSubModeStrings', learnSubModeStrings or {}) }}
  {{ set(UiContext, 'learnPathCardPractiseCounts', learnPathCardPractiseCounts or {}) }}
  {{ set(UiContext, 'todayCompletedCount', todayCompletedCount) }}
  {{ set(UiContext, 'pendingNodeList', pendingNodeList) }}
  {{ set(UiContext, 'completedSections', completedSections) }}
  {{ set(UiContext, 'completedCardsToday', completedCardsToday or []) }}
  {{ set(UiContext, 'nextCard', nextCard) }}
  {{ set(UiContext, 'sections', sections) }}
  {{ set(UiContext, 'fullDag', fullDag) }}
  {{ set(UiContext, 'pathSections', pathSections or []) }}
  {{ set(UiContext, 'pathFullDag', pathFullDag or []) }}
  {{ set(UiContext, 'pathCurrentSectionId', pathCurrentSectionId or '') }}
  {{ set(UiContext, 'pathCurrentLearnStartCardId', pathCurrentLearnStartCardId or '') }}
  {{ set(UiContext, 'currentSectionId', currentSectionId) }}
  {{ set(UiContext, 'currentSectionIndex', currentSectionIndex) }}
  {{ set(UiContext, 'passedCardIds', passedCardIds) }}
  {{ set(UiContext, 'passedCardKeys', passedCardKeys or []) }}
  {{ set(UiContext, 'passedLegacyCardIds', passedLegacyCardIds or []) }}
  {{ set(UiContext, 'learnBases', learnBases or []) }}
  {{ set(UiContext, 'selectedLearnBaseDocId', selectedLearnBaseDocId) }}
  {{ set(UiContext, 'learnBranch', learnBranch or 'main') }}
  {{ set(UiContext, 'requireBaseSelection', requireBaseSelection) }}
  {{ set(UiContext, 'todayLessonResumableSessionId', todayLessonResumableSessionId or '') }}
  {{ set(UiContext, 'todayLessonResumeUrl', todayLessonResumeUrl or '') }}
  {{ set(UiContext, 'todayLessonCardProgressText', todayLessonCardProgressText or '') }}
  {{ set(UiContext, 'learnWallContributions', learnWallContributions or []) }}
  {{ set(UiContext, 'learnWallContributionDetails', learnWallContributionDetails or {}) }}
</script>
<div class="row">
  <div class="medium-12 columns">
    <div id="learn-container"></div>
  </div>
</div>
{% endblock %}
