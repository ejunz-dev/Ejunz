{% set page_name = "base_detail" %}
{% extends "layout/basic.html" %}
{% block content %}
<script>
  {{ set(UiContext, 'currentBranch', currentBranch) }}
  {{ set(UiContext, 'base', {
    domainId: base.domainId if base else domainId,
    docId: base.docId if base else '',
    bid: base.bid if base else '',
    currentBranch: currentBranch if currentBranch is defined else 'main',
    title: base.title if base else '',
    content: base.content if base else '',
    nodes: base.nodes if base else [],
    edges: base.edges if base else []
  }) }}
  {{ set(UiContext, 'nodeCardsMap', nodeCardsMap if nodeCardsMap is defined else {}) }}
  {{ set(UiContext, 'baseDetailUiPrefs', baseDetailUiPrefs if baseDetailUiPrefs is defined else {}) }}
  {{ set(UiContext, 'files', files or []) }}
</script>
<div class="roadmap-view-page roadmap-detail-page">
  {% if base %}
    <div id="base-detail-viewer" data-doc-id="{{ base.docId }}"></div>
  {% else %}
    <div class="roadmap-view__empty">
      <h2>{{ _('Sorry, there are no knowledge bases yet.') }}</h2>
    </div>
  {% endif %}
</div>
{% endblock %}
