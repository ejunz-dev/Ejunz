{% set page_name = "roadmap_detail" %}
{% extends "layout/basic.html" %}
{% block content %}
<script>
  {{ set(UiContext, 'roadmap', {
    domainId: roadmap.domainId if roadmap else domainId,
    docId: roadmap.docId if roadmap else '',
    rid: roadmap.rid if roadmap else '',
    nodes: roadmap.nodes if roadmap else [],
    edges: roadmap.edges if roadmap else [],
    title: roadmap.title if roadmap else 'Roadmap',
    content: roadmap.content if roadmap else '',
    currentBranch: currentBranch if currentBranch is defined else 'main',
    layout: roadmap.layout if roadmap else {},
    viewport: roadmap.viewport if roadmap else {}
  }) }}
  {{ set(UiContext, 'nodeCardsMap', nodeCardsMap if nodeCardsMap is defined else {}) }}
</script>
<div class="roadmap-view-page roadmap-detail-page">
  {% if roadmap %}
    <div id="roadmap-viewer" data-doc-id="{{ roadmap.docId }}"></div>
  {% else %}
    <div class="roadmap-view__empty">
      <h2>{{ _('Sorry, there are no roadmaps yet.') }}</h2>
      <p>{{ _('Create a roadmap to get started.') }}</p>
      <a class="button" href="{{ url('roadmap_create') }}">{{ _('Create Roadmap') }}</a>
    </div>
  {% endif %}
</div>
{% endblock %}
