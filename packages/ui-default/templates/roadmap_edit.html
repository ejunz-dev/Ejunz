{% set page_name = "roadmap_edit" %}
{% extends "layout/basic.html" %}
{% block content %}
<script>
  {{ set(UiContext, 'editorApiBasePath', 'roadmap') }}
  {{ set(UiContext, 'editorMode', 'roadmap') }}
  {{ set(UiContext, 'currentBranch', currentBranch or 'main') }}
  {{ set(UiContext, 'githubRepo', githubRepo or '') }}
  {{ set(UiContext, 'userGithubTokenConfigured', userGithubTokenConfigured or false) }}
  {{ set(UiContext, 'nodeCardsMap', nodeCardsMap if nodeCardsMap is defined else {}) }}
  {{ set(UiContext, 'roadmapEditorUiPrefs', roadmapEditorUiPrefs if roadmapEditorUiPrefs is defined else {}) }}
  {{ set(UiContext, 'roadmap', {
    domainId: roadmap.domainId if roadmap else domainId,
    docId: roadmap.docId if roadmap else '',
    rid: roadmap.rid if roadmap else '',
    nodes: roadmap.nodes if roadmap else [],
    edges: roadmap.edges if roadmap else [],
    title: roadmap.title if roadmap else 'Roadmap',
    layout: roadmap.layout if roadmap else {},
    viewport: roadmap.viewport if roadmap else {},
    currentBranch: currentBranch or 'main',
    branches: roadmap.branches if roadmap and roadmap.branches else ['main']
  }) }}
</script>
<div class="row base-editor-page roadmap-editor-page">
  <div class="large-12 columns base-editor-page__col">
    <div class="section base-editor-section" style="background: transparent; border: none; box-shadow: none; margin: 0;">
      <div class="section__body no-padding base-editor-section-body" style="background: transparent; padding: 0;">
        <div id="roadmap-editor" class="base-editor-mount" data-doc-id="{{ roadmap.docId if roadmap else '' }}"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
