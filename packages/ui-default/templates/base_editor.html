{% extends "layout/basic.html" %}
{% block content %}
{% set _editor_mode = editorMode or 'base' %}
<script>
  {{ set(UiContext, 'currentBranch', currentBranch) }}
  {{ set(UiContext, 'base', {
    domainId: base.domainId,
    docId: base.docId,
    bid: base.bid,
    currentBranch: currentBranch
  }) }}
  {% if initialBaseDoc is defined and initialBaseDoc %}
  {{ set(UiContext, 'initialBaseDoc', initialBaseDoc) }}
  {% endif %}
  {{ set(UiContext, 'nodeCardsMap', nodeCardsMap or {}) }}
  {{ set(UiContext, 'files', files or []) }}
  {{ set(UiContext, 'todayContribution', todayContribution or { nodes: 0, cards: 0, problems: 0, nodeChars: 0, cardChars: 0, problemChars: 0 }) }}
  {{ set(UiContext, 'todayContributionAllDomains', todayContributionAllDomains or { nodes: 0, cards: 0, problems: 0, nodeChars: 0, cardChars: 0, problemChars: 0 }) }}
  {{ set(UiContext, 'contributions', contributions or []) }}
  {{ set(UiContext, 'contributionDetails', contributionDetails or {}) }}
  {% if developEditorContext is defined and developEditorContext %}
  {{ set(UiContext, 'developEditorContext', developEditorContext) }}
  {% endif %}
  {% if developSessionEditTotals is defined %}
  {{ set(UiContext, 'developSessionEditTotals', developSessionEditTotals) }}
  {% endif %}
  {% if developSessionDeadlineIso is defined and developSessionDeadlineIso %}
  {{ set(UiContext, 'developSessionDeadlineIso', developSessionDeadlineIso) }}
  {% endif %}
  {% if developSessionStartedAtIso is defined and developSessionStartedAtIso %}
  {{ set(UiContext, 'developSessionStartedAtIso', developSessionStartedAtIso) }}
  {% endif %}
  {% if editorDevelopSessionKind is defined and editorDevelopSessionKind %}
  {{ set(UiContext, 'editorDevelopSessionKind', editorDevelopSessionKind) }}
  {% endif %}
  {{ set(UiContext, 'baseExpandState', baseExpandState or []) }}
  {{ set(UiContext, 'baseEditorUiPrefs', baseEditorUiPrefs or {}) }}
  {{ set(UiContext, 'editorRootNodeId', editorRootNodeId or '') }}
  {{ set(UiContext, 'editorFocusNodeId', editorFocusNodeId or '') }}
  {{ set(UiContext, 'githubRepo', githubRepo or '') }}
  {{ set(UiContext, 'userGithubTokenConfigured', userGithubTokenConfigured or false) }}
  {% if editorUiMode %}
  {{ set(UiContext, 'editorUiMode', editorUiMode) }}
  {% endif %}
  {% set _socketPrefix = 'base/ws?domainId=' %}
  {% set _sessws = '' %}
  {% if developEditorSessionHex is defined and developEditorSessionHex %}
  {% set _sessws = '&developEditorSession=' + developEditorSessionHex %}
  {% endif %}
  {{ set(UiContext, 'socketUrl', _socketPrefix + (domainId or (base and base.domainId) or '') + '&docId=' + (base.docId.toString() if base and base.docId else '') + _sessws) }}
</script>
<div class="row base-editor-page">
  <div class="large-12 columns base-editor-page__col">
    <div class="section base-editor-section" style="background: transparent; border: none; box-shadow: none; margin: 0;">
      <div class="section__body no-padding base-editor-section-body" style="background: transparent; padding: 0;">
        <div id="{{ _editor_mode }}-editor-mode" class="base-editor-mount" data-doc-id="{{ base.docId if base else '' }}"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
