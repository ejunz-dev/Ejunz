{% extends "layout/basic.html" %}
{% block content %}
<script>
  {{ set(UiContext, 'currentBranch', branch) }}
  {{ set(UiContext, 'base', {
    domainId: base.domainId,
    docId: base.docId,
    bid: base.bid,
    title: base.title,
    currentBranch: branch
  }) }}
  {{ set(UiContext, 'card', {
    docId: card.docId,
    cid: card.cid,
    title: card.title,
    content: card.content,
    cardFace: card.cardFace,
    updateAt: card.updateAt,
    createdAt: card.createdAt,
    order: card.order,
    nodeId: card.nodeId,
    problems: card.problems,
    files: card.files,
    cardType: card.cardType,
    fileType: card.fileType,
    fileName: card.fileName,
    fileSize: card.fileSize
  }) }}
  {{ set(UiContext, 'sessionId', sessionId) }}
  {{ set(UiContext, 'nodeId', nodeId) }}
  {{ set(UiContext, 'domainId', domainId) }}
</script>
<div class="row">
  <div class="large-12 columns">
    <div class="section" style="background: transparent; border: none; box-shadow: none; margin: 0;">
      <div class="section__body no-padding" style="background: transparent; padding: 0;">
        <div id="card-editor-mode" class="card-editor-mount"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
