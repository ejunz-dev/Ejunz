'Learn new review ratio': Ratio (new vs old = section slot vs learning start only; review slots ≈ new-segment count × N)
'Learn new review order label': New vs review sequence (next daily run)
'Learn new review order hint': After counts are chosen, controls whether **review** runs before, after, or shuffled with **new** in the frozen queue. Same UTC day keeps the same shuffle order.
