'Learn ratio section label': Sub mode · new/review ratio (next daily run)
'Learn ratio section hint': Main mode (deep/breadth/random) only affects ordering of **new-segment** cards in the daily queue. Daily goal counts **new** cards in mixed and new-only modes; in **review-only** mode the same number is how many **review** cards to draw. Each mixed daily session length = new slice (goal cap, cycle new pool if short) plus (new count × N) **old-segment** review pulls (cycle old pool if short; if there is no old segment, append none). New-only and review-only modes skip the other arm.
'Learn today ratio summary': '{0} review card(s) per new card'
'Learn today ratio summary new only': 'New only (no review in this run)'
'Learn today ratio summary review only': 'Review only — count follows daily goal'
'New vs review ratio label new only': 'New only (1 : 0)'
'New vs review ratio label review only': 'Review only (0 : 1, count = daily goal)'
'Learn path card loop count': '×{0}'
'Learn path card loop count title': Times this card was completed on the learning path (each full attempt counts; review queue prefers lower counts)
'Learn sub mode': Card mix (next daily run)
'Learn sub mode new only': New only (cards at/after learning-start section slot)
'Learn sub mode review only': Review only (cards before learning-start section slot)
'Learn sub mode mixed': New + review
'Learn new review ratio': Ratio (new vs old = section slot vs learning start only; review slots ≈ new-segment count × N)
'Learn new review order label': New vs review sequence (next daily run)
'Learn new review order hint': After counts are chosen, controls whether **review** runs before, after, or shuffled with **new** in the frozen queue. Same UTC day keeps the same shuffle order.
'Learn new review order aria': New versus review order in the daily queue
'Learn new review order new first': New first, then review (default)
'Learn new review order old first': Review first, then new
'Learn new review order shuffle': Shuffle new and review
'Learn mixed schedule': Order (new + review)
'Learn mixed schedule review first': Review first
'Learn mixed schedule new first': New first
'Learn mixed schedule shuffle': Shuffle
'Learn mixed schedule one one': 1+1 (alternate new/review)
